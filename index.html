<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Afitpilot — Coach Outreach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #0f0f0f; --paper: #f7f4ef; --surface: #ffffff;
  --muted: #6b6560; --faint: #e8e4dd; --accent: #c8522a;
  --accent-light: #f5ede8; --success: #2d6a4f; --success-light: #e8f4ee;
  --border: rgba(15,15,15,0.12); --radius: 6px; --radius-lg: 12px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; padding: 2.5rem 1rem 4rem; }
.container { max-width: 680px; margin: 0 auto; }
 
.header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark { width: 32px; height: 32px; background: var(--ink); border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.brand-mark span { font-family: 'DM Serif Display', serif; color: var(--paper); font-size: 16px; }
.brand-name { font-family: 'DM Serif Display', serif; font-size: 18px; letter-spacing: -0.02em; }
.brand-sub { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
.sheet-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); text-decoration: none; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-family: 'DM Mono', monospace; transition: all 0.15s; }
.sheet-btn:hover { color: var(--ink); border-color: var(--ink); }
 
.section-label { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
 
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 5px; font-family: 'DM Mono', monospace; letter-spacing: 0.03em; }
 
input, select, textarea { width: 100%; padding: 9px 12px; font-size: 14px; font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); border: 1px solid var(--border); border-radius: var(--radius); outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
input:focus, select:focus, textarea:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(15,15,15,0.06); background: var(--surface); }
textarea { resize: vertical; min-height: 68px; line-height: 1.6; }
select { cursor: pointer; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 500px) { .row { grid-template-columns: 1fr; } }
 
.ig-preview { display: none; margin-top: 6px; padding: 7px 10px; background: var(--paper); border-radius: var(--radius); font-size: 13px; color: var(--muted); align-items: center; gap: 6px; border: 1px solid var(--border); font-family: 'DM Mono', monospace; }
.ig-preview.show { display: flex; }
.ig-preview a { color: #E1306C; text-decoration: none; }
 
/* Hook selector */
.hook-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
@media (max-width: 500px) { .hook-grid { grid-template-columns: 1fr; } }
.hook-chip {
  padding: 9px 12px; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--paper);
  font-size: 12px; font-family: 'DM Mono', monospace;
  color: var(--muted); cursor: pointer;
  transition: all 0.15s; text-align: left; line-height: 1.4;
}
.hook-chip:hover { border-color: var(--ink); color: var(--ink); background: var(--surface); }
.hook-chip.selected { border-color: var(--accent); color: var(--accent); background: var(--accent-light); font-weight: 500; }
.hook-chip .chip-label { font-size: 11px; display: block; margin-bottom: 2px; opacity: 0.7; }
.hook-chip .chip-name { font-size: 12px; display: block; }
 
.btn-generate { width: 100%; padding: 11px 16px; background: var(--ink); color: var(--paper); border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.15s, transform 0.1s; margin-top: 4px; letter-spacing: -0.01em; }
.btn-generate:hover { opacity: 0.85; }
.btn-generate:active { transform: scale(0.99); }
.btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }
 
.btn-submit { width: 100%; padding: 11px 16px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.15s, transform 0.1s; letter-spacing: -0.01em; }
.btn-submit:hover { opacity: 0.88; }
.btn-submit:active { transform: scale(0.99); }
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
 
.btn-copy { padding: 7px 12px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'DM Mono', monospace; display: flex; align-items: center; gap: 5px; transition: all 0.15s; }
.btn-copy:hover { color: var(--ink); border-color: var(--ink); }
.btn-copy.copied { color: var(--success); border-color: var(--success); }
 
.dm-section { display: none; margin-top: 1rem; }
.dm-section.show { display: block; }
.dm-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.dm-label { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.dm-edit { width: 100%; padding: 14px; background: var(--paper); color: var(--ink); border: 1px solid var(--accent); border-radius: var(--radius); font-size: 14px; line-height: 1.7; font-family: 'DM Sans', sans-serif; resize: vertical; min-height: 160px; outline: none; box-shadow: 0 0 0 3px var(--accent-light); }
.dm-hint { font-size: 11px; color: var(--muted); margin-top: 6px; font-family: 'DM Mono', monospace; }
 
.toast { display: none; padding: 11px 14px; border-radius: var(--radius); font-size: 13px; align-items: center; gap: 8px; margin-bottom: 1rem; font-family: 'DM Mono', monospace; }
.toast.success { background: var(--success-light); color: var(--success); border: 1px solid rgba(45,106,79,0.2); }
.toast.error { background: var(--accent-light); color: var(--accent); border: 1px solid rgba(200,82,42,0.2); }
.toast.show { display: flex; }
 
.spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.35); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
footer { text-align: center; font-size: 11px; color: var(--muted); margin-top: 2.5rem; font-family: 'DM Mono', monospace; }
</style>
</head>
<body>
<div class="container">
 
  <div class="header">
    <div class="brand">
      <div class="brand-mark"><span>A</span></div>
      <div>
        <div class="brand-name">Afitpilot</div>
        <div class="brand-sub">Coach Outreach Tool</div>
      </div>
    </div>
    <a class="sheet-btn" href="https://docs.google.com/spreadsheets/d/1Ra42Zbj7fKQeKFJZwPKDa46Z4ze_zRfsUPRUzHEBSjA/edit#gid=558936933" target="_blank" rel="noopener">↗ Outreach Log</a>
  </div>
 
  <div id="toast" class="toast"></div>
 
  <!-- 01 Profile -->
  <div class="section-label">01 — Profile info</div>
  <div class="card">
    <div class="field">
      <label>Instagram URL</label>
      <input type="url" id="url" placeholder="https://www.instagram.com/username/" oninput="parseHandle(this.value)">
      <div class="ig-preview" id="handle-preview">
        <span style="color:#E1306C">▸</span>
        <a id="handle-link" href="#" target="_blank" rel="noopener"></a>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>First name</label>
        <input type="text" id="name" placeholder="e.g. Laura">
      </div>
      <div class="field">
        <label>Followers</label>
        <input type="text" id="followers" placeholder="e.g. 12.4K">
      </div>
    </div>
    <div class="field">
      <label>Type / Role</label>
      <input type="text" id="type" placeholder="e.g. PT / S&C Coach / Nutritionist">
    </div>
    <div class="row">
      <div class="field">
        <label>Language</label>
        <select id="language">
          <option value="">Select...</option>
          <option>French</option>
          <option>Dutch</option>
          <option>English</option>
          <option>French/English</option>
          <option>Dutch/English</option>
          <option>Spanish</option>
          <option>Portuguese</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>ICP fit?</label>
        <select id="icp">
          <option value="Yes">Yes</option>
          <option value="Maybe">Maybe</option>
          <option value="No">No</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Niche / Angle</label>
      <input type="text" id="niche" placeholder="e.g. Busy dads, fat loss, holistic coaching...">
    </div>
    <div class="field">
      <label>Notes / flags</label>
      <textarea id="notes" placeholder="Anything specific you noticed about their content or profile..."></textarea>
    </div>
  </div>
 
  <!-- 02 Hook -->
  <div class="section-label">02 — Select DM hook</div>
  <div class="card">
    <label style="margin-bottom:10px">Pick the angle that best fits this coach</label>
    <div class="hook-grid" id="hook-grid">
      <!-- filled by JS -->
    </div>
  </div>
 
  <!-- 03 Generate -->
  <div class="section-label">03 — Generate & edit DM</div>
  <div class="card">
    <button class="btn-generate" id="gen-btn" onclick="generateDM()">✦ Generate DM</button>
    <div class="dm-section" id="dm-section">
      <div style="height:12px"></div>
      <div class="dm-header">
        <span class="dm-label">Your DM — edit before sending</span>
        <button class="btn-copy" id="copy-btn" onclick="copyDM()">Copy</button>
      </div>
      <textarea class="dm-edit" id="dm-text" rows="7"></textarea>
      <div class="dm-hint">✎ Edit freely — what's here gets saved to the sheet</div>
    </div>
  </div>
 
  <!-- 04 Save -->
  <div class="section-label">04 — Save to outreach log</div>
  <div class="card">
    <button class="btn-submit" id="submit-btn" onclick="saveToSheet()">↗ Add to Outreach Log</button>
  </div>
 
  <footer>Afitpilot · Coach Outreach Tool</footer>
</div>
 
<script>
const SCRIPT_URL = "https://script.google.com/a/macros/afitpilot.com/s/AKfycbyAT7ZPtG0VxlRu9y8VmZ_aXxcDIvnTd4skoXAcscTi_OnYk4uAjzLDo-cW6e0Xn2uv/exec";
 
// All hooks — label shown in chip, key used internally, dm = the "specific thing" slot
const HOOKS = [
  { key: "multi-role", label: "Multi-role ops", name: "Juggling multiple roles", dm: "how coaches who juggle multiple roles — training clients, creating content, running their own products — actually manage their day-to-day operations and where the friction shows up" },
  { key: "meta-coaching", label: "Coaches other coaches", name: "Coaches coaches", dm: "how coaches who also work with other coaches think about what they see breaking down operationally when they look inside other people's practices" },
  { key: "niche-online", label: "Niche online delivery", name: "Niche online delivery", dm: "how coaches who work in a very specific niche think about delivering that work online — especially when your approach needs to be highly personalised but your audience is global" },
  { key: "content-vs-coaching", label: "Content vs coaching", name: "Content vs coaching split", dm: "how fitness creators who work with brands think about the line between content and actual coaching — whether that's something they actively want to grow or keep completely separate" },
  { key: "solo-to-scale", label: "Solo → team scale", name: "Scaling from solo", dm: "how coaches who've moved from solo practice to running a team think about what actually breaks at each stage of that transition — and what they'd do differently" },
  { key: "combat-sports", label: "Combat sports background", name: "Combat sports → fitness", dm: "how coaches who come from a martial arts or combat sports background think about what that training philosophy brings to general fitness coaching — whether the discipline and methodology actually transfers" },
  { key: "multi-format", label: "Multi-format delivery", name: "Multi-format ops", dm: "how coaches who run multiple delivery formats at once — individual, duo, group, online — think about managing capacity without one format eating into the others" },
  { key: "90-day-program", label: "Structured program", name: "Program completion", dm: "how online coaches who run structured programs — fixed duration, defined methodology — think about what actually makes clients complete the program versus drop off before the end" },
  { key: "entrepreneur-niche", label: "Entrepreneur/pro niche", name: "Busy professional clients", dm: "how coaches who work specifically with entrepreneurs and professionals think about keeping clients consistent when their schedule is the main obstacle to everything" },
  { key: "pt-nutrition", label: "PT + nutrition combo", name: "Training + nutrition", dm: "how coaches who cover both training and nutrition think about combining the two in practice — whether clients actually follow it as one integrated plan or treat them as completely separate things" },
  { key: "elite-athlete", label: "Elite athlete coach", name: "Elite → general translation", dm: "how elite athletes who also coach think about translating their own competition prep into something that actually works for non-elite clients — how much of the methodology really transfers" },
  { key: "hyrox", label: "Hyrox / functional", name: "Hyrox prep niche", dm: "how coaches who specialise in Hyrox prep think about that offer — whether it works as a standalone or mainly pulls in clients who are already training with them for something else" },
  { key: "prenatal", label: "Pre/post natal", name: "Pre & post natal", dm: "how coaches who specialise in pre and post natal work think about structuring that offer — whether it runs alongside a general coaching practice or needs to sit completely separately" },
  { key: "platform-coaching", label: "Platform/club coaching", name: "Platform-based coaching", dm: "how personal trainers who work within a coaching platform or club structure think about what they can and can't control in how they deliver their work day-to-day" },
  { key: "women-coaching", label: "Women's coaching", name: "Women-only coaching", dm: "how coaches who work exclusively with women think about what's fundamentally different in that coaching relationship — whether the programming or the client management changes more" },
  { key: "holistic", label: "Holistic / mindset", name: "Holistic coaching", dm: "how coaches who combine physical training with mindset or personal development work think about structuring that offer — whether clients engage with both sides equally or it skews heavily one way" },
  { key: "endurance", label: "Endurance / running", name: "Endurance coaching", dm: "how endurance coaches think about the strength side of their athletes' training — how much of that methodology they own versus hand off, and how they think about the crossover" },
  { key: "team-sports", label: "Team sports prep", name: "Team → individual", dm: "how physical preparation coaches who work with team sports athletes think about adapting their programming when they also take on individual clients — whether the logic transfers or it's essentially two different jobs" },
  { key: "audience-conversion", label: "Large audience", name: "Followers → clients", dm: "how coaches with a large audience think about the gap between followers and actual coaching clients — what that conversion really looks like in practice and whether a big following helps or creates its own complications" },
  { key: "online-transition", label: "In-person → online", name: "Online transition", dm: "how personal trainers who coach in-person think about whether and how to move part of their practice online — what actually holds coaches back and what makes that transition work" },
  { key: "philosophy-driven", label: "Philosophy-driven", name: "Coaching philosophy", dm: "how coaches who have a distinct coaching philosophy or methodology think about communicating that to clients who just want results without the framework" },
  { key: "dual-specialisation", label: "Dual specialisation", name: "Fat loss + hypertrophy", dm: "how coaches who specialise in both fat loss and hypertrophy think about switching between the two with clients — whether the programming and the client management feel fundamentally different" },
  { key: "real-food", label: "Food philosophy", name: "Nutrition philosophy → offer", dm: "how coaches who build around a specific food or nutrition philosophy think about turning that into an actual coaching offer — what it looks like structurally versus just being a content angle" },
  { key: "community-niche", label: "Community niche", name: "Community-specific coaching", dm: "how coaches who work with a very specific community or identity group think about building trust with that audience — whether the coaching itself needs to be fundamentally different or it's more about how you position and communicate it" },
];
 
let selectedHook = null;
 
function buildHookGrid() {
  const grid = document.getElementById('hook-grid');
  grid.innerHTML = HOOKS.map((h, i) => `
    <button class="hook-chip" data-key="${h.key}" onclick="selectHook('${h.key}')">
      <span class="chip-label">${h.label}</span>
      <span class="chip-name">${h.name}</span>
    </button>
  `).join('');
}
 
function selectHook(key) {
  selectedHook = key;
  document.querySelectorAll('.hook-chip').forEach(c => {
    c.classList.toggle('selected', c.dataset.key === key);
  });
}
 
function parseHandle(url) {
  const match = url.match(/instagram\.com\/([^/?#\s]+)/);
  const preview = document.getElementById('handle-preview');
  const link = document.getElementById('handle-link');
  if (match && match[1] && !['p','reel','stories','explore'].includes(match[1])) {
    link.textContent = '@' + match[1];
    link.href = 'https://www.instagram.com/' + match[1] + '/';
    preview.classList.add('show');
  } else {
    preview.classList.remove('show');
  }
}
 
function getHandle(url) {
  const match = url.match(/instagram\.com\/([^/?#\s]+)/);
  return match ? '@' + match[1] : url;
}
 
function generateDM() {
  if (!selectedHook) {
    showToast('error', 'Select a DM hook first');
    return;
  }
 
  const hook = HOOKS.find(h => h.key === selectedHook);
  const name = document.getElementById('name').value.trim();
  const greeting = name && name !== '—' ? `Hey ${name}` : 'Hey';
 
  const dm = `${greeting} — I'm a founder doing research on ${hook.dm}. Not pitching anything, just genuinely trying to understand how that works in practice. If you've got 15 minutes in the next couple of weeks, I'd really value your perspective — happy to share what I'm finding from other coaches in return.`;
 
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.textContent = 'Generating...';
 
  setTimeout(() => {
    document.getElementById('dm-text').value = dm;
    document.getElementById('dm-section').classList.add('show');
    btn.disabled = false;
    btn.textContent = '↺ Regenerate';
    document.getElementById('dm-text').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 400);
}
 
function copyDM() {
  const text = document.getElementById('dm-text').value;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}
 
async function saveToSheet() {
  const url = document.getElementById('url').value.trim();
  const dm = document.getElementById('dm-text').value.trim();
  if (!url) { showToast('error', 'Add an Instagram URL first'); return; }
  if (!dm) { showToast('error', 'Generate a DM first'); return; }
 
  const hook = selectedHook ? HOOKS.find(h => h.key === selectedHook) : null;
 
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving...';
 
  const coach = {
    handle: getHandle(url),
    url,
    name: document.getElementById('name').value.trim() || '—',
    followers: document.getElementById('followers').value.trim() || '—',
    type: document.getElementById('type').value.trim() || '—',
    language: document.getElementById('language').value || '—',
    icp: document.getElementById('icp').value,
    niche: document.getElementById('niche').value.trim() || '—',
    hook: hook ? hook.name : '',
    notes: dm,
    date: new Date().toLocaleDateString('en-GB')
  };
 
  const params = new URLSearchParams();
  params.append('data', JSON.stringify(coach));
 
  try {
    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: params });
    showToast('success', 'Saved to Outreach Log ✓');
    clearForm();
  } catch(err) {
    showToast('error', 'Connection error — try again');
  }
 
  btn.disabled = false;
  btn.innerHTML = '↗ Add to Outreach Log';
}
 
function clearForm() {
  ['url','name','followers','type','niche','notes','dm-text'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('language').value = '';
  document.getElementById('icp').value = 'Yes';
  document.getElementById('handle-preview').classList.remove('show');
  document.getElementById('dm-section').classList.remove('show');
  document.getElementById('gen-btn').textContent = '✦ Generate DM';
  selectedHook = null;
  document.querySelectorAll('.hook-chip').forEach(c => c.classList.remove('selected'));
}
 
function showToast(type, msg) {
  const t = document.getElementById('toast');
  t.className = 'toast ' + type + ' show';
  t.textContent = msg;
  setTimeout(() => t.classList.remove('show'), 4000);
}
 
buildHookGrid();
</script>
</body>
</html>
