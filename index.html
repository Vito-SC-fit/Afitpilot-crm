<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Afitpilot — Add a Coach</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.25);
    --text: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-muted: #999;
    --accent: #1a1a2e;
    --accent-text: #ffffff;
    --success-bg: #eaf3de;
    --success-text: #3b6d11;
    --success-border: rgba(59,109,17,0.3);
    --error-bg: #fcebeb;
    --error-text: #a32d2d;
    --error-border: rgba(163,45,45,0.3);
    --radius: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141414;
      --surface: #1e1e1e;
      --border: rgba(255,255,255,0.1);
      --border-hover: rgba(255,255,255,0.25);
      --text: #f0f0f0;
      --text-secondary: #aaa;
      --text-muted: #666;
      --accent: #e8e8e8;
      --accent-text: #1a1a1a;
      --success-bg: #173404;
      --success-text: #c0dd97;
      --success-border: rgba(192,221,151,0.3);
      --error-bg: #501313;
      --error-text: #f09595;
      --error-border: rgba(240,149,149,0.3);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 640px; margin: 0 auto; }

  .logo {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 1.5rem;
  }
  .logo-dot {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
  }
  .logo-dot span { color: var(--accent-text); font-size: 13px; font-weight: 700; }
  .logo-name { font-size: 15px; font-weight: 600; }

  header { margin-bottom: 2rem; }
  header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  header p { font-size: 14px; color: var(--text-secondary); }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .card-title {
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 1.25rem;
  }

  .field { margin-bottom: 1rem; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block; font-size: 13px; font-weight: 500;
    color: var(--text-secondary); margin-bottom: 5px;
  }

  input, select, textarea {
    width: 100%; padding: 9px 11px;
    font-size: 14px; font-family: inherit;
    background: var(--bg); color: var(--text);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    outline: none; transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--border-hover);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
  }
  textarea { resize: vertical; min-height: 72px; line-height: 1.5; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) { .row { grid-template-columns: 1fr; } }

  .ig-preview {
    display: none; margin-top: 6px; padding: 7px 10px;
    background: var(--bg); border-radius: var(--radius);
    font-size: 13px; color: var(--text-secondary);
    align-items: center; gap: 6px;
    border: 0.5px solid var(--border);
  }
  .ig-preview.show { display: flex; }
  .ig-preview a { color: #E1306C; text-decoration: none; font-weight: 500; }

  .btn-primary {
    width: 100%; padding: 11px;
    background: var(--accent); color: var(--accent-text);
    border: none; border-radius: var(--radius);
    font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: opacity 0.15s;
    margin-top: 4px;
  }
  .btn-primary:hover { opacity: 0.82; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .toast {
    display: none; padding: 11px 14px;
    border-radius: var(--radius); font-size: 13px;
    align-items: center; gap: 8px;
    margin-bottom: 1.25rem;
  }
  .toast.success { background: var(--success-bg); color: var(--success-text); border: 0.5px solid var(--success-border); }
  .toast.error { background: var(--error-bg); color: var(--error-text); border: 0.5px solid var(--error-border); }
  .toast.show { display: flex; }

  .sheet-link {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 13px; color: var(--text-secondary);
    text-decoration: none; padding: 6px 0;
  }
  .sheet-link:hover { color: var(--text); }

  footer { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 2rem; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">

  <div class="logo">
    <div class="logo-dot"><span>A</span></div>
    <span class="logo-name">Afitpilot CRM</span>
  </div>

  <header>
    <h1>Add a coach</h1>
    <p>Fill in the profile details — it goes straight into the Outreach Log.</p>
  </header>

  <div id="toast" class="toast"></div>

  <div class="card">
    <div class="card-title">Profile info</div>

    <div class="field">
      <label>Instagram profile URL</label>
      <input type="url" id="url" placeholder="https://www.instagram.com/username/" oninput="parseHandle(this.value)">
      <div class="ig-preview" id="handle-preview">
        <i class="ti ti-brand-instagram" style="color:#E1306C"></i>
        <a id="handle-link" href="#" target="_blank" rel="noopener"></a>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Name</label>
        <input type="text" id="name" placeholder="Full name">
      </div>
      <div class="field">
        <label>Followers</label>
        <input type="text" id="followers" placeholder="e.g. 12.4K">
      </div>
    </div>

    <div class="field">
      <label>Type / Role</label>
      <input type="text" id="type" placeholder="e.g. PT / S&C Coach / Nutritionist">
    </div>

    <div class="row">
      <div class="field">
        <label>Language</label>
        <select id="language">
          <option value="">Select...</option>
          <option>French</option>
          <option>Dutch</option>
          <option>English</option>
          <option>French/English</option>
          <option>Dutch/English</option>
          <option>Spanish</option>
          <option>Portuguese</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>ICP fit?</label>
        <select id="icp">
          <option value="Yes">Yes</option>
          <option value="Maybe">Maybe</option>
          <option value="No">No</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Niche / Angle</label>
      <input type="text" id="niche" placeholder="e.g. Busy dads, fat loss niche, holistic coaching...">
    </div>
  </div>

  <div class="card">
    <div class="card-title">Outreach</div>

    <div class="field">
      <label>DM hook used</label>
      <textarea id="hook" placeholder="Paste or summarise the DM message sent..."></textarea>
    </div>

    <div class="field">
      <label>Notes / flags</label>
      <textarea id="notes" placeholder="Anything to flag — influencer profile, not ideal ICP, etc."></textarea>
    </div>

    <button class="btn-primary" id="submit-btn" onclick="addCoach()">
      <i class="ti ti-table-import"></i> Add to Outreach Log
    </button>

    <div style="margin-top:12px">
      <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1Ra42Zbj7fKQeKFJZwPKDa46Z4ze_zRfsUPRUzHEBSjA/edit#gid=558936933" target="_blank" rel="noopener">
        <i class="ti ti-external-link"></i> Open Outreach Log
      </a>
    </div>
  </div>

  <footer>Afitpilot CRM · Submissions go directly to the Outreach Log</footer>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/a/macros/afitpilot.com/s/AKfycbyAT7ZPtG0VxlRu9y8VmZ_aXxcDIvnTd4skoXAcscTi_OnYk4uAjzLDo-cW6e0Xn2uv/exec";

function parseHandle(url) {
  const match = url.match(/instagram\.com\/([^/?#\s]+)/);
  const preview = document.getElementById('handle-preview');
  const link = document.getElementById('handle-link');
  if (match && match[1] && !['p','reel','stories','explore'].includes(match[1])) {
    link.textContent = '@' + match[1];
    link.href = 'https://www.instagram.com/' + match[1] + '/';
    preview.classList.add('show');
  } else {
    preview.classList.remove('show');
  }
}

function getHandle(url) {
  const match = url.match(/instagram\.com\/([^/?#\s]+)/);
  return match ? '@' + match[1] : url;
}

async function addCoach() {
  const url = document.getElementById('url').value.trim();
  if (!url) { document.getElementById('url').focus(); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Sending...';

  const coach = {
    handle: getHandle(url),
    url,
    name: document.getElementById('name').value.trim() || '—',
    followers: document.getElementById('followers').value.trim() || '—',
    type: document.getElementById('type').value.trim() || '—',
    language: document.getElementById('language').value || '—',
    icp: document.getElementById('icp').value,
    niche: document.getElementById('niche').value.trim() || '—',
    hook: document.getElementById('hook').value.trim() || '',
    notes: document.getElementById('notes').value.trim() || '',
    date: new Date().toLocaleDateString('en-GB')
  };

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(coach)
    });
    clearForm();
    showToast('success', 'Coach added to the Outreach Log!');
  } catch (err) {
    showToast('error', 'Something went wrong — check your connection and try again.');
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-table-import"></i> Add to Outreach Log';
}

function clearForm() {
  ['url','name','followers','type','niche','hook','notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('language').value = '';
  document.getElementById('icp').value = 'Yes';
  document.getElementById('handle-preview').classList.remove('show');
}

function showToast(type, msg) {
  const t = document.getElementById('toast');
  t.className = 'toast ' + type + ' show';
  t.innerHTML = '<i class="ti ti-' + (type === 'success' ? 'circle-check' : 'alert-circle') + '"></i> ' + msg;
  setTimeout(() => t.classList.remove('show'), 4000);
}
</script>
</body>
</html>
